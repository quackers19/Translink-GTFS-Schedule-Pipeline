name: "Translink GTFS Schedule to SQLite"

description: "Converts translinks GTFS schedule to a database"

branding:
  icon: 'map-pin'
  color: 'white'

inputs:
  gtfs-url:
    description: "URL of the GTFS zip or files"
    required: true

  output:
    description: "Output SQLite database filename"
    required: false
    default: "gtfs-schedule.db"
  schema:
    description: "Path or URL to schema.sql to use (optional)"
    required: false
    default: ""

  stop-ids:
    description: "Optional comma-separated list of stop IDs to keep when trimming the database"
    required: false
    default: ""

  no-overwrite:
    description: "If true, do not overwrite existing output database"
    required: false
    default: "false"

runs:
  using: "composite"

  steps:
    - uses: actions/setup-python@v6
      with:
        python-version: "3.14"

    - shell: bash
      run: |
        pip install -r ${{ github.action_path }}/requirements.txt

    - shell: bash
      run: |
        # Build command with optional args
        CMD=(python "${{ github.action_path }}/parser.py")
        CMD+=(--gtfs-url "${{ inputs.gtfs-url }}")
        CMD+=(--output "${{ inputs.output }}")
        if [ -n "${{ inputs.schema }}" ]; then
          CMD+=(--schema "${{ inputs.schema }}")
        fi
        if [ -n "${{ inputs['stop-ids'] }}" ]; then
          CMD+=(--stop-ids "${{ inputs['stop-ids'] }}")
        fi
        if [ "${{ inputs.no-overwrite }}" = "true" ]; then
          CMD+=(--no-overwrite)
        fi
        "${CMD[@]}"

        